<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>llmx</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-state="empty">
  <main class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Local-first codebase search</p>
        <h1>llmx</h1>
        <p class="lead">Drop a folder to index and search locally.</p>
      </div>
      <div class="hero-stats" id="hero-stats">
        <span id="backend-info" class="stat-badge">Loading...</span>
        <span id="chunk-count" class="stat-badge" hidden>0 chunks</span>
      </div>
    </header>

    <!-- State: empty - Drop zone is primary -->
    <section class="panel drop-panel" id="drop-panel">
      <div id="drop-zone" class="drop-zone">
        <svg class="drop-icon" width="48" height="48" viewBox="0 0 24 24" fill="none">
          <path d="M21 15V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="17 8 12 3 7 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h2>Drop a folder here</h2>
        <p class="hint">or</p>
        <div class="drop-actions">
          <button id="select-folder" class="primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M22 19C22 19.5304 21.7893 20.0391 21.4142 20.4142C21.0391 20.7893 20.5304 21 20 21H4C3.46957 21 2.96086 20.7893 2.58579 20.4142C2.21071 20.0391 2 19.5304 2 19V5C2 4.46957 2.21071 3.96086 2.58579 3.58579C2.96086 3.21071 3.46957 3 4 3H9L11 6H20C20.5304 6 21.0391 6.21071 21.4142 6.58579C21.7893 6.96086 22 7.46957 22 8V19Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Select Folder
          </button>
          <button id="load-index-json" class="secondary">Load Index JSON</button>
        </div>
        <input id="folder-input" type="file" webkitdirectory directory multiple hidden />
        <input id="files-input" type="file" multiple hidden />
        <input id="index-json-input" type="file" accept=".json,application/json" hidden />
      </div>
      <p class="status" id="ingest-status"></p>
    </section>

    <!-- State: indexed - Search becomes primary -->
    <section class="panel search-panel" id="search-panel">
      <div class="tool-tabs" id="tool-tabs">
        <button class="secondary tool-tab is-active" type="button" data-tool="search">Search</button>
        <button class="secondary tool-tab" type="button" data-tool="symbols">Symbols</button>
        <button class="secondary tool-tab" type="button" data-tool="lookup">Lookup</button>
        <button class="secondary tool-tab" type="button" data-tool="refs">Refs</button>
        <button class="secondary tool-tab" type="button" data-tool="stats">Stats</button>
      </div>

      <div class="tool-view is-active" id="search-view" data-tool-view="search">
        <div class="search-box">
          <input id="query" type="search" placeholder="Search..." autocomplete="off" />
          <button id="run-search" class="search-btn" aria-label="Search">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
              <path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="controls-grid search-controls">
          <label class="control-field">
            <span>Strategy</span>
            <select id="search-strategy">
              <option value="auto">Auto</option>
              <option value="bm25">BM25</option>
              <option value="semantic">Semantic</option>
              <option value="hybrid">Hybrid</option>
            </select>
          </label>
          <label class="control-field">
            <span>Hybrid</span>
            <select id="hybrid-strategy">
              <option value="rrf">RRF</option>
              <option value="linear">Linear</option>
            </select>
          </label>
          <label class="control-field">
            <span>Intent</span>
            <select id="search-intent">
              <option value="auto">Auto</option>
              <option value="symbol">Symbol</option>
              <option value="semantic">Semantic</option>
              <option value="keyword">Keyword</option>
            </select>
          </label>
          <label class="control-check">
            <input id="search-explain" type="checkbox" checked />
            <span>Explain matches</span>
          </label>
        </div>
        <div class="controls-grid filters-grid">
          <label class="control-field">
            <span>Path Prefix</span>
            <input id="path-filter" type="text" placeholder="src/" />
          </label>
          <label class="control-field">
            <span>File</span>
            <select id="file-filter"><option value=""></option></select>
          </label>
          <label class="control-field">
            <span>Kind</span>
            <select id="kind-filter"><option value=""></option></select>
          </label>
          <label class="control-field">
            <span>Outline</span>
            <select id="outline-filter"><option value=""></option></select>
          </label>
          <label class="control-field">
            <span>Symbol</span>
            <select id="symbol-filter"><option value=""></option></select>
          </label>
        </div>
        <div id="results" class="results"></div>
      </div>

      <div class="tool-view" id="symbols-view" data-tool-view="symbols">
        <div class="controls-grid">
          <label class="control-field">
            <span>Pattern</span>
            <input id="symbols-pattern" type="text" placeholder="parse* or *token*" />
          </label>
          <label class="control-field">
            <span>Kind</span>
            <select id="symbols-kind">
              <option value="">All kinds</option>
              <option value="function">Function</option>
              <option value="method">Method</option>
              <option value="class">Class</option>
              <option value="interface">Interface</option>
              <option value="type">Type</option>
              <option value="enum">Enum</option>
              <option value="constant">Constant</option>
              <option value="variable">Variable</option>
              <option value="test">Test</option>
            </select>
          </label>
          <label class="control-field">
            <span>Path Prefix</span>
            <input id="symbols-path" type="text" placeholder="src/" />
          </label>
          <label class="control-field">
            <span>Limit</span>
            <input id="symbols-limit" type="number" min="1" max="500" value="50" />
          </label>
          <button id="run-symbols" class="primary control-action" type="button">List Symbols</button>
        </div>
        <div id="symbols-results" class="results"></div>
      </div>

      <div class="tool-view" id="lookup-view" data-tool-view="lookup">
        <div class="controls-grid">
          <label class="control-field">
            <span>Symbol</span>
            <input id="lookup-symbol" type="text" placeholder="parseConfig or parse*" />
          </label>
          <label class="control-field">
            <span>Kind</span>
            <select id="lookup-kind">
              <option value="">All kinds</option>
              <option value="function">Function</option>
              <option value="method">Method</option>
              <option value="class">Class</option>
              <option value="interface">Interface</option>
              <option value="type">Type</option>
              <option value="enum">Enum</option>
              <option value="constant">Constant</option>
              <option value="variable">Variable</option>
              <option value="test">Test</option>
            </select>
          </label>
          <label class="control-field">
            <span>Path Prefix</span>
            <input id="lookup-path" type="text" placeholder="src/" />
          </label>
          <label class="control-field">
            <span>Limit</span>
            <input id="lookup-limit" type="number" min="1" max="200" value="20" />
          </label>
          <button id="run-lookup" class="primary control-action" type="button">Lookup Symbol</button>
        </div>
        <div id="lookup-results" class="results"></div>
      </div>

      <div class="tool-view" id="refs-view" data-tool-view="refs">
        <div class="controls-grid">
          <label class="control-field">
            <span>Symbol</span>
            <input id="refs-symbol" type="text" placeholder="verifyToken" />
          </label>
          <label class="control-field">
            <span>Direction</span>
            <select id="refs-direction">
              <option value="callers">Callers</option>
              <option value="callees">Callees</option>
              <option value="importers">Importers</option>
              <option value="imports">Imports</option>
              <option value="type_users">Type Users</option>
            </select>
          </label>
          <label class="control-field">
            <span>Depth</span>
            <input id="refs-depth" type="number" min="1" max="8" value="1" />
          </label>
          <label class="control-field">
            <span>Limit</span>
            <input id="refs-limit" type="number" min="1" max="200" value="20" />
          </label>
          <button id="run-refs" class="primary control-action" type="button">Trace Refs</button>
        </div>
        <div id="refs-results" class="results"></div>
      </div>

      <div class="tool-view" id="stats-view" data-tool-view="stats">
        <div id="stats-summary" class="stats-grid"></div>
        <div id="stats-breakdowns" class="breakdowns"></div>
      </div>

      <div id="chunk-view" class="chunk-view" hidden>
        <div class="chunk-header">
          <strong id="chunk-title"></strong>
          <button id="close-chunk" class="close-btn">&times;</button>
        </div>
        <pre id="chunk-content"></pre>
      </div>
    </section>

    <!-- State: indexed - Export available -->
    <section class="panel export-panel" id="export-panel">
      <div class="export-actions">
        <button id="replace-index" class="secondary">Replace Index</button>
        <button id="download-export" class="secondary">Download Searchable ZIP</button>
        <button id="download-compact-export" class="secondary">Download Compact Agent ZIP</button>
      </div>
      <p class="export-note">Searchable ZIP includes <code>index.json</code>. Compact agent ZIP is for token-efficient sharing.</p>
    </section>

    <!-- Hidden elements for JS compatibility -->
    <div hidden>
      <span id="embeddings-status"></span>
      <button id="build-embeddings"></button>
      <button id="download-index-json"></button>
      <span id="index-id"></span>
      <span id="warning-count"></span>
      <div id="warning-list"></div>
    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
