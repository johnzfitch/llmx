name: CI

on:
  pull_request:
  push:
    branches:
      - master

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run CLI integration tests
        run: cargo test -p llmx-mcp --features cli --test cli_tests -- --nocapture

      - name: Compile MCP tests
        run: cargo test -p llmx-mcp --features mcp --test mcp_tests --no-run

      - name: Check crate package contents
        run: cargo package -p llmx-mcp --allow-dirty --list
